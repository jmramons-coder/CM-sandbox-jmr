<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Empire highlight calibration</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; margin: 0; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    figure { margin: 0; background: #222; border-radius: 8px; padding: 12px; }
    figcaption { font-size: 12px; margin-bottom: 8px; word-break: break-all; }
    .frame { position: relative; display: inline-block; max-width: 100%; }
    .frame img { display: block; width: 100%; height: auto; }
    .hl { position: absolute; border: 2px solid rgba(245,162,0,0.9); background: rgba(245,162,0,0.22); box-sizing: border-box; border-radius: 3px; }
    .hl:nth-child(odd) { border-color: rgba(59,130,246,0.9); background: rgba(59,130,246,0.18); }
  </style>
</head>
<body>
  <h1>Empire document highlight calibration</h1>
  <div class="grid" id="grid"></div>
  <script type="module">
    const HIGHLIGHTS = {
      doc_emp_nb_app: [
        { id: 'anchor_1', top: 50.5, left: 20, width: 44, height: 7.5 },
        { id: 'anchor_2', top: 41, left: 20, width: 38, height: 5.5 },
        { id: 'anchor_3', top: 65.5, left: 20, width: 72, height: 14 },
      ],
      doc_emp_nb_needs: [
        { id: 'anchor_1', top: 49, left: 20, width: 58, height: 6 },
        { id: 'anchor_2', top: 63, left: 20, width: 58, height: 9 },
      ],
      doc_emp_nb_mib: [
        { id: 'anchor_1', top: 43.5, left: 6, width: 88, height: 9 },
        { id: 'anchor_2', top: 23.5, left: 6, width: 88, height: 13 },
      ],
      doc_emp_nb_lab_req: [
        { id: 'anchor_1', top: 52.5, left: 6, width: 88, height: 19 },
        { id: 'anchor_2', top: 13.5, left: 6, width: 44, height: 7 },
      ],
      doc_emp_nb_rx: [
        { id: 'anchor_1', top: 43.5, left: 6, width: 88, height: 10 },
        { id: 'anchor_2', top: 52.5, left: 6, width: 88, height: 5.5 },
        { id: 'anchor_3', top: 62, left: 6, width: 88, height: 10 },
      ],
      doc_emp_nb_scuba_sent: [
        { id: 'anchor_1', top: 18, left: 28, width: 67, height: 11 },
        { id: 'anchor_2', top: 44, left: 28, width: 64, height: 16 },
      ],
      doc_emp_nb_scuba_reminder: [
        { id: 'anchor_1', top: 29, left: 2.4, width: 93, height: 11 },
        { id: 'anchor_2', top: 41.5, left: 2.4, width: 93, height: 7.5 },
      ],
      doc_emp_nb_aps_request: [
        { id: 'anchor_1', top: 5.5, left: 58, width: 36, height: 6.5 },
        { id: 'anchor_2', top: 45.5, left: 6, width: 88, height: 10 },
        { id: 'anchor_3', top: 36, left: 6, width: 88, height: 9 },
      ],
      doc_emp_nb_add_ins_decline: [
        { id: 'anchor_1', top: 42, left: 2.4, width: 93, height: 8.5 },
        { id: 'anchor_2', top: 53.5, left: 2.4, width: 93, height: 9 },
        { id: 'anchor_3', top: 63, left: 2.4, width: 93, height: 7.5 },
      ],
    };

    const FILES = {
      doc_emp_nb_app: 'application_solution20_amelie_dubois.png',
      doc_emp_nb_needs: 'advisor_needs_analysis_amelie_dubois.png',
      doc_emp_nb_mib: 'mib_results_amelie_dubois.png',
      doc_emp_nb_lab_req: 'lab_requisition_dynacare_ottawa.png',
      doc_emp_nb_rx: 'rx_report_intelliscript_amelie_dubois.png',
      doc_emp_nb_scuba_sent: 'scuba_questionnaire_portal_notification.png',
      doc_emp_nb_scuba_reminder: 'email_scuba_questionnaire_reminder.png',
      doc_emp_nb_aps_request: 'aps_request_clinique_plateau.png',
      doc_emp_nb_add_ins_decline: 'letter_add_insured_decline_luc_dubois.png',
    };

    const grid = document.getElementById('grid');
    for (const [docId, file] of Object.entries(FILES)) {
      const fig = document.createElement('figure');
      const cap = document.createElement('figcaption');
      cap.textContent = docId;
      const frame = document.createElement('div');
      frame.className = 'frame';
      const img = document.createElement('img');
      img.src = `../../public/documents/empire/${file}`;
      img.alt = docId;
      frame.appendChild(img);
      for (const hl of HIGHLIGHTS[docId]) {
        const div = document.createElement('div');
        div.className = 'hl';
        div.title = hl.id;
        div.style.top = `${hl.top}%`;
        div.style.left = `${hl.left}%`;
        div.style.width = `${hl.width}%`;
        div.style.height = `${hl.height}%`;
        frame.appendChild(div);
      }
      fig.appendChild(cap);
      fig.appendChild(frame);
      grid.appendChild(fig);
    }
  </script>
</body>
</html>
